<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ramadhan Tracker" />
    <meta name="description" content="Track your nightly Ramadhan worship activities" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <title>Ramadhan Tracker</title>
    <!-- Tailwind CSS (pre-built) -->
    <link rel="stylesheet" href="style.css" />
    <style>
      .check-ring { transition: background-color 0.2s, border-color 0.2s; }
      input[type='date']::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
      .chevron { transition: transform 0.2s; }
      .chevron.open { transform: rotate(180deg); }
    </style>
  </head>

  <body class="bg-slate-900 text-white min-h-screen">
    <div id="app" class="max-w-md mx-auto px-4 py-6 pb-12">

      <!-- ── Loading State ─────────────────────────────── -->
      <div v-if="isLoading" class="flex items-center justify-center h-64">
        <p class="text-slate-400 text-lg animate-pulse">Loading…</p>
      </div>

      <!-- ── App Content ───────────────────────────────── -->
      <template v-else>

        <!-- Header -->
        <header class="text-center mb-6">
          <h1 class="text-3xl font-bold text-amber-400 tracking-wide">🌙 Ramadhan Tracker</h1>
          <p class="text-slate-400 text-sm mt-1">Track your nightly worship activities</p>
          <button
            v-if="!isStandalone && (deferredInstall || isIOS)"
            @click="showInstallModal = true"
            class="mt-3 inline-flex items-center gap-1.5 text-xs bg-amber-400/10 hover:bg-amber-400/20 text-amber-400 border border-amber-400/30 rounded-full px-3 py-1.5 transition"
          >
            📲 Install App
          </button>
        </header>

        <!-- Streak Card -->
        <div class="bg-slate-800 rounded-2xl p-4 mb-4 text-center shadow-lg">
          <p class="text-2xl font-bold text-orange-400">
            🔥 Streak: {{ streak }} {{ streak === 1 ? 'day' : 'days' }}
          </p>
          <p class="text-slate-400 text-xs mt-1">Consecutive days with at least one activity</p>
        </div>

        <!-- Today Card -->
        <div class="bg-slate-800 rounded-2xl p-4 mb-4 shadow-lg">
          <div class="flex items-center justify-between mb-3">
            <h2 class="font-semibold text-amber-400 text-sm uppercase tracking-wider">Today</h2>
            <div class="text-right">
              <p class="text-slate-400 text-sm">{{ formatDate(todayKey) }}</p>
              <p v-if="hijriDate" class="text-amber-300 text-xs font-medium">{{ hijriDate }}</p>
            </div>
          </div>

          <!-- Progress bar -->
          <div class="mb-4">
            <div class="flex justify-between text-sm text-slate-400 mb-2">
              <span>Progress</span>
              <span class="font-semibold text-white">{{ todayCompleted }} / {{ totalItems }} completed</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-3 overflow-hidden">
              <div
                class="bg-amber-400 h-3 rounded-full transition-all duration-500"
                :style="{ width: progressPercent + '%' }"
              ></div>
            </div>
          </div>

          <!-- Checklist items: Daily / General -->
          <div class="mb-3">
            <button @click="toggleSection('general')" class="w-full flex items-center justify-between py-2 text-left">
              <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Daily</span>
              <span class="chevron text-slate-400 text-xs" :class="{ open: sectionExpanded.general }">&#9660;</span>
            </button>
            <ul v-if="sectionExpanded.general" class="space-y-2">
              <li
                v-for="item in generalItems"
                :key="item.id"
                class="flex items-center gap-3 p-3 rounded-xl bg-slate-700/40"
              >
                <div
                  @click="toggleTodayItem(item.id)"
                  class="check-ring w-6 h-6 rounded-full border-2 flex-shrink-0 flex items-center justify-center cursor-pointer"
                  :class="todayData[item.id] ? 'bg-amber-400 border-amber-400' : 'border-slate-500'"
                >
                  <span v-if="todayData[item.id]" class="text-slate-900 text-xs font-black">✓</span>
                </div>
                <span
                  @click="toggleTodayItem(item.id)"
                  class="flex-1 text-base cursor-pointer select-none"
                  :class="todayData[item.id] ? 'line-through text-slate-400' : 'text-white'"
                >{{ item.name }}</span>
                <div v-if="item.unit" class="flex items-center gap-1">
                  <button @click="setTodayQty(item.id, getQty(todayData, item.id) - 1)" class="w-6 h-6 rounded-full bg-slate-600 hover:bg-slate-500 text-white text-sm leading-none flex items-center justify-center">&minus;</button>
                  <span class="text-sm text-amber-300 w-7 text-center">{{ getQty(todayData, item.id) }}</span>
                  <button @click="setTodayQty(item.id, getQty(todayData, item.id) + 1)" class="w-6 h-6 rounded-full bg-slate-600 hover:bg-slate-500 text-white text-sm leading-none flex items-center justify-center">+</button>
                  <span class="text-xs text-slate-500 ml-1">{{ item.unit }}</span>
                </div>
              </li>
            </ul>
          </div>

          <!-- Checklist items: Night Prayers -->
          <div>
            <button @click="toggleSection('night')" class="w-full flex items-center justify-between py-2 text-left">
              <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Night Prayers</span>
              <span class="chevron text-slate-400 text-xs" :class="{ open: sectionExpanded.night }">&#9660;</span>
            </button>
            <ul v-if="sectionExpanded.night" class="space-y-2">
              <li
                v-for="item in nightItems"
                :key="item.id"
                @click="toggleTodayItem(item.id)"
                class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-slate-700 active:bg-slate-600 transition select-none"
                :class="{ 'opacity-60': todayData[item.id] }"
              >
                <div
                  class="check-ring w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0"
                  :class="todayData[item.id] ? 'bg-amber-400 border-amber-400' : 'border-slate-500'"
                >
                  <span v-if="todayData[item.id]" class="text-slate-900 text-xs font-black">✓</span>
                </div>
                <span class="text-base" :class="todayData[item.id] ? 'line-through text-slate-400' : 'text-white'">{{ item.name }}</span>
              </li>
            </ul>
          </div>
        </div>

        <!-- Zikir & Dua Card -->
        <div class="bg-slate-800 rounded-2xl p-4 mb-4 shadow-lg">
          <button @click="toggleSection('zikir')" class="w-full flex items-center justify-between text-left">
            <h2 class="font-semibold text-amber-400 text-sm uppercase tracking-wider">📿 Zikir &amp; Dua</h2>
            <span class="chevron text-slate-400 text-xs" :class="{ open: sectionExpanded.zikir }">&#9660;</span>
          </button>
          <div v-if="sectionExpanded.zikir" class="mt-3 space-y-2">
            <div v-for="z in zikirList" :key="z.id" class="rounded-xl overflow-hidden border border-slate-700">
              <div class="flex items-center gap-3 px-4 py-3 bg-slate-700/50">
                <div
                  @click="toggleTodayItem(z.id)"
                  class="check-ring w-6 h-6 rounded-full border-2 flex-shrink-0 flex items-center justify-center cursor-pointer"
                  :class="todayData[z.id] ? 'bg-amber-400 border-amber-400' : 'border-slate-500'"
                >
                  <span v-if="todayData[z.id]" class="text-slate-900 text-xs font-black">✓</span>
                </div>
                <span
                  @click="toggleTodayItem(z.id)"
                  class="flex-1 text-sm font-medium cursor-pointer select-none"
                  :class="todayData[z.id] ? 'line-through text-slate-400' : 'text-white'"
                >{{ z.title }}</span>
                <button @click="toggleZikir(z.id)" class="flex-shrink-0 text-slate-400 hover:text-amber-400 px-1 transition">
                  <span class="chevron text-xs" :class="{ open: expandedZikir[z.id] }">&#9660;</span>
                </button>
              </div>
              <div v-if="expandedZikir[z.id]" class="px-4 py-3 space-y-2 bg-slate-800/80">
                <p class="text-right text-2xl leading-loose text-amber-200 font-medium" dir="rtl">{{ z.arabic }}</p>
                <p class="text-slate-400 text-sm border-t border-slate-700 pt-2">{{ z.meaning }}</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Share Button -->
        <button
          @click="share"
          class="w-full bg-amber-400 hover:bg-amber-500 active:bg-amber-600 text-slate-900 font-bold py-3 rounded-2xl mb-4 transition shadow-lg text-base"
        >
          {{ shareStatus || '📤 Share Today\'s Result' }}
        </button>

        <!-- History Card -->
        <div class="bg-slate-800 rounded-2xl p-4 shadow-lg">
          <h2 class="font-semibold text-amber-400 text-sm uppercase tracking-wider mb-3">
            📅 History
          </h2>

          <!-- Date Picker -->
          <input
            type="date"
            v-model="selectedDate"
            :max="todayKey"
            class="w-full bg-slate-700 text-white rounded-xl px-4 py-2 mb-4 border border-slate-600 focus:outline-none focus:border-amber-400 transition"
          />

          <!-- Past date checklist -->
          <div v-if="!isViewingToday">
            <div class="flex items-center justify-between mb-3">
              <p class="text-slate-300 text-sm">{{ formatDate(selectedDate) }}</p>
              <span class="text-amber-400 text-sm font-semibold">
                {{ selectedCompleted }} / {{ totalItems }}
              </span>
            </div>
            <!-- Daily -->
            <div class="mb-3">
              <button @click="toggleSection('general')" class="w-full flex items-center justify-between py-2 text-left">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Daily</span>
                <span class="chevron text-slate-400 text-xs" :class="{ open: sectionExpanded.general }">&#9660;</span>
              </button>
              <ul v-if="sectionExpanded.general" class="space-y-2">
                <li
                  v-for="item in generalItems"
                  :key="item.id"
                  class="flex items-center gap-3 p-3 rounded-xl bg-slate-700/40"
                >
                  <div
                    @click="toggleSelectedItem(item.id)"
                    class="check-ring w-6 h-6 rounded-full border-2 flex-shrink-0 flex items-center justify-center cursor-pointer"
                    :class="selectedData[item.id] ? 'bg-amber-400 border-amber-400' : 'border-slate-500'"
                  >
                    <span v-if="selectedData[item.id]" class="text-slate-900 text-xs font-black">✓</span>
                  </div>
                  <span
                    @click="toggleSelectedItem(item.id)"
                    class="flex-1 text-base cursor-pointer select-none"
                    :class="selectedData[item.id] ? 'line-through text-slate-400' : 'text-white'"
                  >{{ item.name }}</span>
                  <div v-if="item.unit" class="flex items-center gap-1">
                    <button @click="setSelectedQty(item.id, getQty(selectedData, item.id) - 1)" class="w-6 h-6 rounded-full bg-slate-600 hover:bg-slate-500 text-white text-sm leading-none flex items-center justify-center">&minus;</button>
                    <span class="text-sm text-amber-300 w-7 text-center">{{ getQty(selectedData, item.id) }}</span>
                    <button @click="setSelectedQty(item.id, getQty(selectedData, item.id) + 1)" class="w-6 h-6 rounded-full bg-slate-600 hover:bg-slate-500 text-white text-sm leading-none flex items-center justify-center">+</button>
                    <span class="text-xs text-slate-500 ml-1">{{ item.unit }}</span>
                  </div>
                </li>
              </ul>
            </div>
            <!-- Night Prayers -->
            <div>
              <button @click="toggleSection('night')" class="w-full flex items-center justify-between py-2 text-left">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Night Prayers</span>
                <span class="chevron text-slate-400 text-xs" :class="{ open: sectionExpanded.night }">&#9660;</span>
              </button>
              <ul v-if="sectionExpanded.night" class="space-y-2">
                <li
                  v-for="item in nightItems"
                  :key="item.id"
                  @click="toggleSelectedItem(item.id)"
                  class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-slate-700 active:bg-slate-600 transition select-none"
                  :class="{ 'opacity-60': selectedData[item.id] }"
                >
                  <div
                    class="check-ring w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0"
                    :class="selectedData[item.id] ? 'bg-amber-400 border-amber-400' : 'border-slate-500'"
                  >
                    <span v-if="selectedData[item.id]" class="text-slate-900 text-xs font-black">✓</span>
                  </div>
                  <span class="text-base" :class="selectedData[item.id] ? 'line-through text-slate-400' : 'text-white'">{{ item.name }}</span>
                </li>
              </ul>
            </div>
          </div>

          <p v-else class="text-slate-400 text-sm text-center py-2">
            Select a previous date above to view or edit past entries.
          </p>
        </div>

      </template>

      <!-- PWA Install Modal -->
      <div
        v-if="showInstallModal"
        class="fixed inset-0 bg-black/60 flex items-end justify-center z-50"
        @click.self="showInstallModal = false"
      >
        <div class="bg-slate-800 w-full max-w-md rounded-t-3xl p-6 pb-10 shadow-2xl">
          <div class="w-12 h-1.5 bg-slate-600 rounded-full mx-auto mb-6"></div>
          <div class="text-center mb-6">
            <div class="text-5xl mb-3">🌙</div>
            <h3 class="text-xl font-bold text-white mb-2">Install Ramadhan Tracker</h3>
            <p class="text-slate-400 text-sm">Add to your home screen for quick access, offline use, and a fullscreen experience.</p>
          </div>
          <!-- Android / Chrome -->
          <div v-if="deferredInstall">
            <button
              @click="installPWA"
              class="w-full bg-amber-400 hover:bg-amber-500 text-slate-900 font-bold py-3 rounded-2xl mb-3 transition text-base"
            >
              📲 Add to Home Screen
            </button>
            <button @click="showInstallModal = false" class="w-full text-slate-400 hover:text-white py-2 text-sm transition">
              Not now
            </button>
          </div>
          <!-- iOS Safari -->
          <div v-else-if="isIOS" class="space-y-3">
            <div class="bg-slate-700 rounded-xl p-4 space-y-3 text-sm text-slate-300">
              <div class="flex items-start gap-3">
                <span class="text-lg leading-none">1️⃣</span>
                <span>Tap the <strong class="text-white">Share</strong> button <span class="text-lg">⬆️</span> at the bottom of Safari</span>
              </div>
              <div class="flex items-start gap-3">
                <span class="text-lg leading-none">2️⃣</span>
                <span>Scroll down and tap <strong class="text-white">Add to Home Screen</strong></span>
              </div>
              <div class="flex items-start gap-3">
                <span class="text-lg leading-none">3️⃣</span>
                <span>Tap <strong class="text-white">Add</strong> to confirm</span>
              </div>
            </div>
            <button @click="showInstallModal = false" class="w-full text-slate-400 hover:text-white py-2 text-sm transition">
              Got it
            </button>
          </div>
        </div>
      </div>

    </div>

    <!-- Vue 3 (includes template compiler) -->
    <script type="module" src="app.js"></script>

    <!-- Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('./service-worker.js')
            .catch((err) => console.warn('Service worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
